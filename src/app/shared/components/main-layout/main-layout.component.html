<div class="min-h-screen bg-poke-darker text-gray-100 flex flex-col md:flex-row">
  <!-- Sidebar -->
  <aside class="w-full md:w-64 glass-panel border-r border-white/5 flex flex-col z-20 animate-fade-in">
    <div class="p-6 border-b border-white/10 flex items-center space-x-3">
      <div class="w-10 h-10 rounded-full bg-poke-blue flex items-center justify-center font-bold text-white shadow-lg shadow-poke-blue/30">
        P
      </div>
      <h1 class="text-xl font-bold bg-gradient-to-r from-poke-blue to-poke-yellow bg-clip-text text-transparent">PokéDash</h1>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-4 space-y-2">
      <a routerLink="/pokedex" routerLinkActive="bg-white/10 text-poke-yellow" class="flex items-center px-4 py-3 rounded-lg text-gray-300 hover:bg-white/5 hover:text-white transition-all">
        <span class="font-medium">Pokédex</span>
      </a>
      <a routerLink="/team" routerLinkActive="bg-white/10 text-poke-yellow" class="flex items-center px-4 py-3 rounded-lg text-gray-300 hover:bg-white/5 hover:text-white transition-all">
        <span class="font-medium">My Team</span>
      </a>
      <a routerLink="/stats" routerLinkActive="bg-white/10 text-poke-yellow" class="flex items-center px-4 py-3 rounded-lg text-gray-300 hover:bg-white/5 hover:text-white transition-all">
        <span class="font-medium">Trainer Stats</span>
      </a>
    </nav>

    <!-- Trainer Profile Snippet using Angular 17+ control flow -->
    @if (profile(); as p) {
      <div class="p-4 border-t border-white/10 m-4 rounded-xl bg-white/5 backdrop-blur-sm cursor-pointer hover:bg-white/10 transition-colors">
        <div class="flex items-center space-x-3">
          <img [src]="p.avatarUrl" alt="Avatar" class="w-12 h-12 rounded-full border-2 border-poke-yellow">
          <div>
            <p class="text-sm font-medium text-white truncate w-32">{{ p.name }}</p>
            <p class="text-xs text-gray-400">Team: {{ p.team.length }}/6</p>
          </div>
        </div>
      </div>
    }
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
    <!-- Decorative background elements -->
    <div class="absolute top-[-20%] right-[-10%] w-[500px] h-[500px] bg-poke-blue/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[20%] w-[300px] h-[300px] bg-poke-red/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="flex-1 overflow-y-auto p-6 lg:p-8 z-10 animate-slide-up">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
